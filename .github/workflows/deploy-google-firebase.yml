name: Deploy Google Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGION: asia-southeast1
  SERVICE: fastrack-erp-web
  ARTIFACT_REPOSITORY: fastrack

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Enable Google APIs
        run: |
          gcloud services enable run.googleapis.com cloudbuild.googleapis.com artifactregistry.googleapis.com firebasehosting.googleapis.com

      - name: Ensure Artifact Registry repository
        run: |
          gcloud artifacts repositories describe "$ARTIFACT_REPOSITORY" --location="$REGION" >/dev/null 2>&1 || \
          gcloud artifacts repositories create "$ARTIFACT_REPOSITORY" --repository-format=docker --location="$REGION"

      - name: Build and deploy Cloud Run
        run: |
          gcloud builds submit --config cloudbuild.yaml \
            --substitutions=_REGION="$REGION",_SERVICE="$SERVICE"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase Hosting
        run: firebase deploy --only hosting --project "${{ secrets.FIREBASE_PROJECT_ID }}"
