name: Patch finance audit log UI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - tools/patch_finance_auditlog_ui.py
      - .github/workflows/patch-finance-auditlog-ui.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Patch finance audit log UI
        run: python tools/patch_finance_auditlog_ui.py
      - name: Commit patched web app
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Simplify finance audit log UI
          file_pattern: PythonApplication1/web_app.py
